name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: ['*']

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm i
      - run: npm test
      - run: npm run build
      - run: .github/workflows/test-build.sh

  corpus:
    name: Verify corpus and models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - run: npm i
      - name: Verify generated corpus
        run: npm run corpus:verify
      - name: Verify generated detector models
        run: npm run models:verify
